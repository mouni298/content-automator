# content-automator configuration

video:
  width: 1080
  height: 1920
  fps: 30
  target_seconds: 45          # ideal Short length
  images_per_video: 9         # more cuts = more dynamic pacing
  crossfade_seconds: 0.6
  music_volume: 0.12          # background music level (0-1), voice stays dominant

script:
  model: gemini-2.5-flash-lite
  max_words: 130              # ~45s of narration at ~170 wpm
  min_words: 95
  # niche + tone guardrails for the LLM
  themes:
    - world history
    - ancient civilizations
    - mythology
    - historical figures
    - archaeology
  tone: "calm, vivid documentary narrator; strong 2-second hook; factual, no filler"

topic:
  # 'queue'  = pull next unused row from data/topics.csv
  # 'onthisday' = Wikipedia "On This Day" for today's date
  # 'auto'   = onthisday, fall back to queue if nothing good
  source: auto
  language: en

feedback:
  max_regens: 2                # cap regenerations per video (prevents loops)

series:
  summary_max_words: 200       # running 'story so far' length cap
  summary_model: gemini-2.5-flash-lite

reach:
  trending:
    enabled: true
    niche_queries: ["ancient history shorts", "mythology explained shorts"]
    max_query_calls: 2         # quota guard (search.list = 100 units each)
    max_videos: 25
    max_extra_tags: 8

analytics:
  enabled: false               # turn on once the channel has views (adds yt-analytics scope, one-time re-consent)
  min_age_hours: 48            # let a video accumulate data before pulling

director:
  enabled: true
  model: gemini-2.5-flash-lite
  # deterministic fallbacks if the LLM never commits a style
  fallbacks:
    mythology:
      tone: "grand, dramatic, mythic documentary narrator"
      voice: en-US-ChristopherNeural
      voice_rate: "-10%"
      music_mood: epic
      visual_strategy: ai-art
      art_style_prompt: "epic classical painting, period-accurate, dramatic cinematic lighting, painterly, no text"
      pacing: slow
    documented-history:
      tone: "calm, authoritative documentary narrator"
      voice: en-US-ChristopherNeural
      voice_rate: "-8%"
      music_mood: somber
      visual_strategy: real
      art_style_prompt: ""
      pacing: medium

tts:
  engine: edge                 # edge (natural, free, online) | piper (robotic, offline)
  rate: "-8%"                  # slower cadence reads as more "documentary"
  voices:                      # keyed by topic.language
    en: en-US-ChristopherNeural   # authoritative news/novel narrator
    te: te-IN-MohanNeural         # Telugu, male
  piper_voice: en_US-lessac-medium  # used only when engine: piper

assets:
  image_source: wikimedia      # public-domain images
  min_image_width: 800
  voices_dir: assets/voices
  music_dir: assets/music
  ai_fallback: true            # generate images (Pollinations.ai, free) when Commons is thin
  ai_style: "historical documentary illustration, period-accurate, cinematic lighting, painterly, no text, no watermark"

captions:
  whisper_model: base          # tiny|base|small ; base is a good speed/quality tradeoff
  max_chars_per_line: 24
  style: "Fontsize=14,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=1,Outline=2,Shadow=1,Alignment=2,MarginV=120"

publish:
  youtube:
    enabled: true
    privacy: public            # public|unlisted|private
    category_id: "27"          # Education
    tags: [history, mythology, shorts, education, didyouknow]
  instagram:
    enabled: false             # phase 2

paths:
  work_dir: work               # per-run scratch (images, audio, srt)
  output_dir: output           # final mp4 + caption json
  db_path: data/state.sqlite
